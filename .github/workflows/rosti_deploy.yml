name: Deploy to Rosti

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Rosti
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Create deployment directory
          ssh $SSH_USER@$SSH_HOST "mkdir -p $DEPLOY_PATH"
          
          # Copy built files to server
          scp -r .next $SSH_USER@$SSH_HOST:$DEPLOY_PATH/
          scp -r public $SSH_USER@$SSH_HOST:$DEPLOY_PATH/
          scp -r package*.json $SSH_USER@$SSH_HOST:$DEPLOY_PATH/
          scp -r next.config.ts $SSH_USER@$SSH_HOST:$DEPLOY_PATH/
          scp -r tsconfig.json $SSH_USER@$SSH_HOST:$DEPLOY_PATH/
          
          # Install dependencies and restart on server
          ssh $SSH_USER@$SSH_HOST "cd $DEPLOY_PATH && npm ci --production && pm2 restart pneu_servis || pm2 start npm --name pneu_servis -- start"

