name: Deploy into Roští.cz

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOST: ssh.rosti.cz
      USER: app
      PORT: 12110
      NODE_VERSION: 22.22.2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ROSTI_DEPLOY_SSH_KEY }}

      - name: Setup hostkey
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p $PORT $HOST >> ~/.ssh/known_hosts

      - name: Create env file
        run: |
          cat << EOF > .env
          ${{ secrets.ENV }}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Build on GitHub
        run: NEXT_TELEMETRY_DISABLED=1 npm run build

      - name: Setup Node.js on Roští
        run: |
          ssh -p $PORT $USER@$HOST /usr/local/bin/rosti node $NODE_VERSION

      - name: Setup Supervisord
        run: |
          cat << EOF > rosti.app.conf
          [program:app]
          command=/srv/bin/primary_tech/npm start
          environment=PATH="/srv/bin/primary_tech:/usr/local/bin:/usr/bin:/bin:/srv/.npm-packages/bin"
          stopasgroup=true
          directory=/srv/app
          process_name=app
          autostart=true
          autorestart=true
          stdout_logfile=/srv/log/node.log
          stdout_logfile_maxbytes=2MB
          stdout_logfile_backups=5
          stdout_capture_maxbytes=2MB
          stdout_events_enabled=false
          redirect_stderr=true
          EOF
          scp -P $PORT rosti.app.conf $USER@$HOST:/srv/conf/supervisor.d/app.conf

      - name: Setup Nginx
        run: |
          cat << EOF > rosti.nginx.conf
          server {
              listen 0.0.0.0:8000;
              listen [::]:8000;

              location / {
                  proxy_pass http://127.0.0.1:8080/;
                  proxy_redirect default;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location /static/ {
                  alias /srv/app/public/;
              }
          }
          EOF
          scp -P $PORT rosti.nginx.conf $USER@$HOST:/srv/conf/nginx.d/app.conf

      - name: Copy built app to Roští
        run: |
          rsync -az -e "ssh -p $PORT" \
            --delete-after \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=data/*.json \
            --exclude=data/*.xlsx \
            --exclude=data/*.xls \
            --exclude='public/uploads/*' \
            ./ $USER@$HOST:/srv/app/

      - name: Install production deps on Roští and restart
        run: |
          ssh -p $PORT $USER@$HOST "cd /srv/app && npm ci --omit=dev"
          ssh -p $PORT $USER@$HOST supervisorctl reread
          ssh -p $PORT $USER@$HOST supervisorctl update
          ssh -p $PORT $USER@$HOST supervisorctl restart nginx
          ssh -p $PORT $USER@$HOST supervisorctl restart app